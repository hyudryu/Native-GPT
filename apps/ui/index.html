<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Native GPT</title>
    <meta name="description" content="Native GPT — local-first AI chat" />

    <!-- PWA / iOS standalone -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Native GPT" />
    <meta
      name="theme-color"
      content="#faf9f7"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#131315"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />

    <!-- Set data-theme before first paint to avoid a theme flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("agentgpt.theme");
          if (t !== "light" && t !== "dark") {
            t =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
