name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - working-directory: apps/agent-runtime
        run: |
          uv sync
          uv run ruff check .
          uv run pytest -q

  ui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @agentgpt/ui exec tsc --noEmit
      - run: pnpm --filter @agentgpt/ui test
      - run: pnpm --filter @agentgpt/ui build

  integration:
    runs-on: windows-latest
    needs: [rust, python, ui]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @agentgpt/ui build
      - run: uv sync --directory apps/agent-runtime
      - run: cargo build -p agentgpt-host
      - name: WS -> host -> sidecar round-trip
        run: bash tests/integration/ws_roundtrip.sh
